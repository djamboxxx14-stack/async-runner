spring:
  application:
    name: async-runner
  
  datasource:
    url: jdbc:postgresql://localhost:5432/async_runner
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  sql:
    init:
      mode: always
      
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml    

server:
  port: 8080

logging:
  level:
    com.example.asyncrunner: DEBUG
    org.hibernate.SQL: DEBUG

app:
  polling:
    batch-size: 10
    interval-ms: 2000  # Проверять каждые 2 секунды
    max-attempts: 3
    retry-delay-seconds: 5