databaseChangeLog:
  - changeSet:
      id: 1-create-orders-table
      author: dzhamil
      changes:
        - createTable:
            tableName: orders
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
              - column:
                  name: customer_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: CREATED
                  constraints:
                    nullable: false
              - column:
                  name: total_amount
                  type: DECIMAL(10,2)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

  - changeSet:
      id: 2-create-tasks-table
      author: dzhamil
      changes:
        - createTable:
            tableName: tasks
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
              - column:
                  name: order_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_tasks_order
                    references: orders(id)
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: NEW
                  constraints:
                    nullable: false
              - column:
                  name: attempts
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: next_attempt_at
                  type: TIMESTAMP
              - column:
                  name: error_message
                  type: VARCHAR(1000)
              - column:
                  name: pricing_result
                  type: JSONB
              - column:
                  name: stock_result
                  type: JSONB
              - column:
                  name: delivery_result
                  type: JSONB
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

  - changeSet:
      id: 3-create-indexes
      author: dzhamil
      changes:
        - createIndex:
            indexName: idx_tasks_status_next_attempt
            tableName: tasks
            columns:
              - column:
                  name: status
              - column:
                  name: next_attempt_at